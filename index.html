<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Me Tsena - Meta Earth Mall</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <!-- Ethers.js pour l'interaction avec le RollApp de ME Network -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
</head>
<body>
    <header>
        <div class="logo">🌍 Me Tsena</div>
        <div class="header-right">
            <select id="langSelect" onchange="changeLanguage(this.value)">
                <option value="fr">Français</option>
                <option value="en">English</option>
                <option value="mg">Malgache</option>
            </select>
            <button id="connectBtn" onclick="connectMEPass()">🔒 Connect ME Pass</button>
        </div>
    </header>

    <main>
        <!-- Section Identité ME Pass -->
        <section id="identitySection" class="card">
            <h2 class="lang-title" data-fr="Mon Passeport ME ID" data-en="My ME ID Passport" data-mg="Ny ME ID-ko">Mon Passeport ME ID</h2>
            <div id="mepassProfile" class="hidden">
                <p><strong>ME ID :</strong> <span id="userId">--</span></p>
                <p><strong>KYC Status :</strong> <span id="kycStatus" class="badge">Verified On-Chain</span></p>
                <p><strong>Solde :</strong> <span id="userBalance">0.00</span> MEC</p>
            </div>
            <p id="loginPrompt" class="lang-text" data-fr="Veuillez connecter votre ME Pass pour entrer dans le centre commercial." data-en="Please connect your ME Pass to enter the mall." data-mg="Ampifandray ny ME Pass-nao raha hiditra ny tsena.">Veuillez connecter votre ME Pass pour entrer dans le centre commercial.</p>
        </section>

        <!-- Section Marchand & Boutiques -->
        <section id="mallSection" class="hidden">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('buyer')" class="lang-text" data-fr="Acheter" data-en="Shop" data-mg="Hividy">Acheter</button>
                <button class="tab-btn" onclick="switchTab('seller')" class="lang-text" data-fr="Ma Boutique (ERC-721)" data-en="My Shop (ERC-721)" data-mg="Ny Tsenako">Ma Boutique (ERC-721)</button>
            </div>

            <!-- Vue Acheteur -->
            <div id="buyerTab" class="tab-content">
                <h3 class="lang-title" data-fr="Boutiques Disponibles" data-en="Available Shops" data-mg="Ireo Tsena misy">Boutiques Disponibles</h3>
                <div id="shopsGrid" class="grid">
                    <!-- Généré dynamiquement par app.js -->
                </div>
            </div>

            <!-- Vue Marchand -->
            <div id="sellerTab" class="tab-content hidden">
                <h3 class="lang-title" data-fr="Gestion Marchande" data-en="Merchant Management" data-mg="Fitantanana ny Tsena">Gestion Marchande</h3>
                <div id="noShopView" class="card text-center">
                    <p class="lang-text" data-fr="Vous ne possédez pas encore de boutique sur Me Tsena." data-en="You do not own a shop on Me Tsena yet." data-mg="Mbola tsy manana tsena ianao ato amin'ny Me Tsena.">Vous ne possédez pas encore de boutique sur Me Tsena.</p>
                    <button class="btn-primary" onclick="mintShop()" class="lang-text" data-fr="Mint ma boutique ERC-721" data-en="Mint my ERC-721 Shop" data-mg="Hoforoniko ny Tsenako (Mint)">Mint ma boutique ERC-721</button>
                </div>
                <div id="shopActiveView" class="hidden">
                    <p class="success-text">🏪 Boutique Contract: <span id="shopContractAddress"></span></p>
                    <!-- Formulaire d'ajout de produit -->
                </div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
